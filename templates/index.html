<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoLiquid — Оценка ликвидности автомобиля</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
        }
        .price {
            font-size: 2.5rem;
            font-weight: bold;
            color: #28a745;
        }
        .days {
            font-size: 2rem;
            font-weight: bold;
            color: #007bff;
        }
        .confidence-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #20c997);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .liquidity-high { background-color: #28a745; color: white; }
        .liquidity-medium { background-color: #ffc107; color: black; }
        .liquidity-low { background-color: #dc3545; color: white; }
        .btn-primary {
            background: linear-gradient(90deg, #667eea, #764ba2);
            border: none;
            padding: 12px 30px;
            font-weight: bold;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .loader {
            display: none;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .feature-badge {
            background: #e9ecef;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin: 3px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="fas fa-car fa-3x text-primary mb-3"></i>
                            <h1 class="display-5 fw-bold">AutoLiquid</h1>
                            <p class="text-muted">Оценка стоимости и ликвидности автомобиля с пробегом</p>
                            <p class="small text-muted">На основе машинного обучения и анализа реальных сделок</p>
                        </div>

                        <form id="predictForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Марка</label>
                                    <select class="form-select" id="brand" required>
                                        <option value="">Выберите марку</option>
                                        {% for brand in brands %}
                                        <option value="{{ brand }}">{{ brand }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Модель</label>
                                    <select class="form-select" id="model" required disabled>
                                        <option value="">Сначала выберите марку</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Год выпуска</label>
                                    <input type="number" class="form-control" id="year" min="1990" max="2025" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Пробег (км)</label>
                                    <input type="number" class="form-control" id="mileage" min="0" max="500000" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Состояние (1-10)</label>
                                    <input type="range" class="form-range" id="condition" min="1" max="10" step="1" value="7">
                                    <div class="d-flex justify-content-between">
                                        <span class="small text-muted">Плохое</span>
                                        <span id="conditionValue" class="fw-bold">7</span>
                                        <span class="small text-muted">Отличное</span>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Цвет</label>
                                    <select class="form-select" id="color" required>
                                        {% for color in colors %}
                                        <option value="{{ color }}">{{ color }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Кол-во владельцев</label>
                                    <select class="form-select" id="owners_count">
                                        <option value="1">1</option>
                                        <option value="2">2</option>
                                        <option value="3">3</option>
                                        <option value="4">4 и более</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Месяц продажи</label>
                                    <select class="form-select" id="month">
                                        {% for i in months %}
                                        <option value="{{ loop.index }}">{{ i }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="accident">
                                    <label class="form-check-label" for="accident">
                                        Автомобиль был в ДТП
                                    </label>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-chart-line me-2"></i>Рассчитать стоимость и ликвидность
                                </button>
                            </div>
                        </form>

                        <div class="loader" id="loader"></div>

                        <div id="result" style="display: none;" class="mt-5">
                            <hr>
                            <div class="result-card">
                                <h4 class="text-center mb-4">Результаты оценки</h4>

                                <div class="row">
                                    <div class="col-md-6 text-center mb-4">
                                        <i class="fas fa-ruble-sign fa-2x text-success mb-2"></i>
                                        <h6>Рекомендуемая цена</h6>
                                        <div class="price" id="price">0</div>
                                        <div class="small text-muted" id="priceRange"></div>
                                        <div class="mt-2">
                                            <div class="confidence-bar">
                                                <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
                                            </div>
                                            <div class="small text-muted mt-1">
                                                Уверенность прогноза: <span id="confidence">0</span>%
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6 text-center">
                                        <i class="fas fa-clock fa-2x text-primary mb-2"></i>
                                        <h6>Прогнозируемый срок продажи</h6>
                                        <div class="days" id="days">0</div>
                                        <div class="small">дней</div>
                                        <div class="mt-3">
                                            <span class="badge" id="liquidityBadge">Высокая ликвидность</span>
                                            <div class="small text-muted mt-2" id="liquidityDesc"></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="mt-4 p-3 bg-light rounded">
                                    <i class="fas fa-chart-simple me-2"></i>
                                    <strong>Рекомендация:</strong>
                                    <p id="recommendation" class="mt-2 mb-0"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Загрузка моделей при выборе марки
        document.getElementById('brand').addEventListener('change', function() {
            const brand = this.value;
            const modelSelect = document.getElementById('model');

            if (brand) {
                fetch(`/get_models/${brand}`)
                    .then(response => response.json())
                    .then(models => {
                        modelSelect.innerHTML = '<option value="">Выберите модель</option>';
                        models.forEach(model => {
                            const option = document.createElement('option');
                            option.value = model;
                            option.textContent = model;
                            modelSelect.appendChild(option);
                        });
                        modelSelect.disabled = false;
                    });
            } else {
                modelSelect.innerHTML = '<option value="">Сначала выберите марку</option>';
                modelSelect.disabled = true;
            }
        });

        // Отображение значения состояния
        document.getElementById('condition').addEventListener('input', function() {
            document.getElementById('conditionValue').textContent = this.value;
        });

        // Обработка формы
        document.getElementById('predictForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Проверка заполнения
            if (!document.getElementById('model').value) {
                alert('Пожалуйста, выберите модель автомобиля');
                return;
            }

            const formData = new FormData();
            formData.append('brand', document.getElementById('brand').value);
            formData.append('model', document.getElementById('model').value);
            formData.append('year', document.getElementById('year').value);
            formData.append('mileage', document.getElementById('mileage').value);
            formData.append('condition', document.getElementById('condition').value);
            formData.append('color', document.getElementById('color').value);
            formData.append('owners_count', document.getElementById('owners_count').value);
            formData.append('accident', document.getElementById('accident').checked ? 1 : 0);
            formData.append('month', document.getElementById('month').value);

            // Показать загрузчик
            document.getElementById('loader').style.display = 'block';
            document.getElementById('result').style.display = 'none';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    alert('Ошибка: ' + data.error);
                    return;
                }

                // Обновление интерфейса
                document.getElementById('price').textContent = new Intl.NumberFormat('ru-RU').format(data.price) + ' ₽';
                document.getElementById('priceRange').textContent =
                    `Диапазон: ${new Intl.NumberFormat('ru-RU').format(data.price_lower)} - ${new Intl.NumberFormat('ru-RU').format(data.price_upper)} ₽`;
                document.getElementById('confidence').textContent = data.confidence;
                document.getElementById('confidenceFill').style.width = data.confidence + '%';
                document.getElementById('days').textContent = data.days_to_sell;

                const liquidityBadge = document.getElementById('liquidityBadge');
                if (data.liquidity === 'Высокая') {
                    liquidityBadge.className = 'badge liquidity-high';
                } else if (data.liquidity === 'Средняя') {
                    liquidityBadge.className = 'badge liquidity-medium';
                } else {
                    liquidityBadge.className = 'badge liquidity-low';
                }
                liquidityBadge.textContent = data.liquidity;
                document.getElementById('liquidityDesc').textContent = data.liquidity_description;

                // Рекомендация
                let recommendation = '';
                if (data.days_to_sell <= 14) {
                    recommendation = `Ваш автомобиль обладает высокой ликвидностью. Рекомендуемая цена — ${new Intl.NumberFormat('ru-RU').format(data.price)} ₽.
                                      Если вам нужно продать быстрее, можно выставить цену на 3-5% ниже рыночной.`;
                } else if (data.days_to_sell <= 30) {
                    recommendation = `Автомобиль продастся в средние сроки. Цена адекватна рынку.
                                      Для ускорения продажи рекомендуем сделать качественные фото и подробное описание.`;
                } else if (data.days_to_sell <= 60) {
                    recommendation = `Рекомендуем снизить цену на 5-10% или провести предпродажную подготовку.
                                      Особое внимание уделите истории обслуживания автомобиля.`;
                } else {
                    recommendation = `Автомобиль может продаваться долго. Рекомендуем существенно пересмотреть цену
                                      (снижение на 10-20%) или рассмотреть продажу через трейд-ин.`;
                }
                document.getElementById('recommendation').textContent = recommendation;

                document.getElementById('result').style.display = 'block';

            } catch (error) {
                alert('Ошибка при получении данных: ' + error.message);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        });
    </script>
</body>
</html>
